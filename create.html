<!DOCTYPE html>
<html>

<head>
<title>Crea Planning</title>

<link rel="stylesheet" href="css/style.css">

<link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/main.min.css" rel="stylesheet">

<style>
#calendar{
max-width:900px;
margin:40px auto;
}
</style>

</head>

<body>

<h1>Crea nuovo planning</h1>

<label>Nome planning</label>
<input id="name" placeholder="Nome città o progetto">

<div id="calendar"></div>

<div style="text-align:center;margin-top:20px;">
Ora arrivo:
<input type="time" id="arrivalTime" value="10:00">

Ora partenza:
<input type="time" id="departureTime" value="18:00">
</div>

<div style="text-align:center;margin-top:20px;">
<button onclick="savePlanning()">Crea planning</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/main.min.js"></script>

<script src="js/storage.js"></script>
<script src="js/planner.js"></script>
<script src="js/calendar.js"></script>

</body>
</html>
