<!DOCTYPE html>
<html>
<head>
    <title>Modifica Planning</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<h2>Modifica Planning</h2>

<div id="tabs" class="tabs">
    <button class="tabBtn active" onclick="openTab('schedule')">Schedule</button>
    <button class="tabBtn" onclick="openTab('places')">Cosa vedere</button>
    <button class="tabBtn" onclick="openTab('food')">Cosa mangiare</button>
    <button class="tabBtn" onclick="openTab('transport')">Trasporti</button>
</div>

<div id="schedule" class="tabContent"></div>
<div id="places" class="tabContent" style="display:none;"></div>
<div id="food" class="tabContent" style="display:none;"></div>
<div id="transport" class="tabContent" style="display:none;"></div>

<button onclick="saveChanges()">Salva modifiche</button>

<script src="js/storage.js"></script>
<script>
let plannings = getPlannings()
let currentIndex = localStorage.getItem("editIndex")
let planning = plannings[currentIndex]

function openTab(tabName){
    document.querySelectorAll('.tabContent').forEach(c=>c.style.display='none')
    document.querySelectorAll('.tabBtn').forEach(b=>b.classList.remove('active'))
    document.getElementById(tabName).style.display='block'
    document.querySelector(`.tabBtn[onclick="openTab('${tabName}')"]`).classList.add('active')
}

// Schedule tab
function renderSchedule(){
    let schedule = planning.schedule
    // ottieni max slots
    let maxHours = Math.max(...Object.values(schedule).map(d=>d.slots.length))
    let days = Object.keys(schedule)
    let html = "<table><tr><th>Ora</th>"
    days.forEach(day=>{html+="<th>"+day+"</th>"})
    html+="</tr>"

    for(let i=0;i<maxHours;i++){
        html+="<tr>"
        let hour = null
        for(let j=0;j<days.length;j++){
            let s = schedule[days[j]].slots[i]
            if(j==0) hour = s.time
            if(s.disabled){html+=`<td class="cell-disabled">---</td>`}
            else html+=`<td contenteditable="true" id="cell-${days[j]}-${i}">${s.activity}</td>`
        }
        html+="</tr>"
    }
    html+="</table>"
    document.getElementById("schedule").innerHTML = html
}
renderSchedule()

// Placeholder tabs
document.getElementById("places").innerHTML = '<p>Aggiungi luoghi da visitare...</p>'
document.getElementById("food").innerHTML = '<p>Aggiungi ristoranti o cibo...</p>'
document.getElementById("transport").innerHTML = '<p>Aggiungi mezzi di trasporto...</p>'

// Salvataggio
function saveChanges(){
    let schedule = planning.schedule
    Object.keys(schedule).forEach(day=>{
        schedule[day].slots.forEach((slot,i)=>{
            if(!slot.disabled){
                slot.activity = document.getElementById(`cell-${day}-${i}`).innerText
            }
        })
    })
    savePlannings(plannings)
    alert("Modifiche salvate!")
}
</script>
</body>
</html>
