<!DOCTYPE html>
<html>
<head>
<title>Travel Planner</title>
<link rel="stylesheet" href="css/index.css">
</head>

<body>

<header>
<h1>Travel Planner</h1>
<div>
  <a href="creator.html" class="newBtn">＋ New</a>
  <a href="planning.html" class="newBtn">§ Join</a>
</div>

</header>

<div id="planningGrid"></div>

<script src="js/storage.js"></script>

<script>

let plannings = getPlannings()
let html = ""

plannings.forEach((p,i)=>{

html += `
<div class="card">
  <div class="cardText">
    <h3>${p.name}</h3>

    <p class="datetime">
      Arrival: 
      ${new Date(p.arrival).toLocaleDateString()} - ${p.arrivalTime || "--:--"}
    </p>
    <p class="datetime">
      Departure: 
      ${new Date(p.departure).toLocaleDateString()} - ${p.departureTime || "--:--"}
    </p> 

  </div>

  <div class="icons">
    <span onclick="viewPlanning(${i})">👁️</span>
    <span onclick="editPlanning(${i})">✏️</span>
    <span onclick="deletePlanning(${i})">🗑️</span>
  </div>
</div>
`
})

document.getElementById("planningGrid").innerHTML = html

function viewPlanning(i){

localStorage.setItem("currentPlanning", i)
localStorage.setItem("mode", "view")

window.location.href="planning.html"

}

function editPlanning(i){

localStorage.setItem("currentPlanning", i)
localStorage.setItem("mode", "edit")

window.location.href="planning.html"

}

function deletePlanning(i){

let plannings = getPlannings()

if(confirm("Vuoi eliminare questo planning?")){

plannings.splice(i,1)
savePlannings(plannings)

location.reload()

}

}

</script>

</body>
</html>
