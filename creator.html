<!DOCTYPE html>
<html>
<head>
<title>Create Planning</title>
<link rel="stylesheet" href="css/index.css">
</head>
<body>
<h1>Create Planning</h1>
<div>
<label>Planning Name</label><br>
<input type="text" id="name">
</div>
<div>
<label>Arrival</label><br>
<input type="datetime-local" id="arrival">
</div>
<div>
<label>Departure</label><br>
<input type="datetime-local" id="departure">
</div>
<br>
<button onclick="createPlanning()">Create Planning</button>
<script src="js/storage.js"></script>
<script>
function createPlanning(){
  let name = document.getElementById("name").value
  let arrivalRaw = document.getElementById("arrival").value
  let departureRaw = document.getElementById("departure").value
  let arrivalDate = arrivalRaw.split("T")[0]
  let arrivalTime = arrivalRaw.split("T")[1]
  let departureDate = departureRaw.split("T")[0]
  let departureTime = departureRaw.split("T")[1]
  let plannings = getPlannings()
  let planning = {
    name: name,
    arrival: arrivalDate,
    departure: departureDate,
    arrivalTime: arrivalTime,
    departureTime: departureTime,
    cells: {}
  }
  plannings.push(planning)
  savePlannings(plannings)
  localStorage.setItem("currentPlanning", plannings.length-1)
  localStorage.setItem("mode", "edit")
  window.location.href="planning.html"
}
</script>
</body>
</html>
